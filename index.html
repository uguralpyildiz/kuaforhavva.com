<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kuaforhavva.com</title>
    <style>
 
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #202124;
            margin: 0;
            padding: 12vh 20px 20px;
            display: flex;
            justify-content: center;
            line-height: 1.5;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        .icon {
            width: 48px;
            height: 48px;
            color: #5f6368;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 16px;
            margin-top: 0;
            color: #202124;
        }

        p {
            font-size: 0.9rem;
            margin-bottom: 16px;
            color: #5f6368;
            margin-top: 0;
        }

        a {
            color: #1a73e8;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .error-code {
            font-size: 0.75rem;
            color: #5f6368;
            margin-bottom: 32px;
            display: block;
            text-transform: uppercase;
        }

        .button {
            display: inline-block;
            background-color: #1a73e8;
            color: white;
            padding: 8px 16px;
            border-radius: 16px;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
        }

        .button:hover {
            background-color: #1557b0;
        }

       
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #202124;
                color: #e8eaed;
            }

            .icon {
                color: #9aa0a6;
            }

            h1 {
                color: #e8eaed;
            }

            p {
                color: #9aa0a6;
            }

            a {
                color: #8ab4f8;
            }

            .error-code {
                color: #9aa0a6;
            }

            .button {
                background-color: #8ab4f8;
                color: #202124;
            }

            .button:hover {
                background-color: #93bcf9;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        
        <svg class="icon" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="square" stroke-linejoin="miter">
            <path
                d="M28 4H12C9.79086 4 8 5.79086 8 8V40C8 42.2091 9.79086 44 12 44H36C38.2091 44 40 42.2091 40 40V16L28 4Z">
            </path>
            <path d="M28 4V16H40"></path>
            <rect x="17" y="24" width="4" height="4" fill="currentColor" stroke="none"></rect>
            <rect x="27" y="24" width="4" height="4" fill="currentColor" stroke="none"></rect>
            <path d="M18 34C18 34 20 31 24 31C28 31 30 34 30 34"></path>
        </svg>

        <h1>Bu siteye ulaşılamıyor</h1>
        <p><strong>kuaforhavva.com</strong> ana makinesinin DNS adresi bulunamadı. Sorun teşhis ediliyor.</p>

        <p><a href="javascript:diagnoseErrors()">Windows Ağ Teşhis Aracı'nı çalıştırmayı deneyin</a>.</p>

        <span class="error-code">DNS_PROBE_STARTED</span>

        <button class="button" onclick="window.location.reload()">Yeniden Yükle</button>
    </div>

    <script>
       
        function diagnoseErrors() {
            console.log("Ağ teşhis aracı tetiklendi...");
           
        }
    </script>

</body>

</html>
